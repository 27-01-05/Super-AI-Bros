<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THE STATIC ROOM</title>
<style>
    body {
        margin: 0;
        background: black;
        color: #b6ffda;
        font-family: "Courier New", monospace;
        overflow: hidden;
    }

    .container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    h1 {
        font-size: 2rem;
        letter-spacing: 4px;
        color: #ff4d6d;
        text-shadow: 0 0 10px #ff4d6d;
        animation: flicker 2s infinite;
    }

    #output {
        margin-top: 40px;
        font-size: 1.2rem;
        max-width: 700px;
        padding: 20px;
        border: 1px solid #333;
        background: rgba(255,255,255,0.02);
        box-shadow: 0 0 20px rgba(0,255,150,0.1);
        min-height: 100px;
    }

    button {
        margin-top: 30px;
        padding: 10px 20px;
        background: none;
        border: 1px solid #b6ffda;
        color: #b6ffda;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #b6ffda;
        color: black;
    }

    @keyframes flicker {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
        70% { opacity: 0.7; }
    }

    .glitch {
        animation: glitch 0.3s infinite;
    }

    @keyframes glitch {
        0% { transform: translate(0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(2px, -2px); }
        60% { transform: translate(-1px, 1px); }
        80% { transform: translate(1px, -1px); }
        100% { transform: translate(0); }
    }
</style>
</head>
<body>

<div class="container">
    <h1 class="glitch">THE STATIC ROOM</h1>
    <div id="output">...</div>
    <button onclick="generate()">LISTEN</button>
</div>

<script>
const subjects = [
    "The ceiling", "A forgotten door", "Your reflection", "The humming wall",
    "The third shadow", "An unseen corridor", "The clock that isn't there",
    "The voice behind silence", "A blinking hallway light", "The empty chair"
];

const verbs = [
    "remembers", "forgets", "breathes through", "waits inside", "folds into",
    "whispers to", "leaks from", "pretends to be", "counts backwards through",
    "dreams of"
];

const objects = [
    "tomorrow's noise", "a broken direction", "invisible footsteps",
    "a color that doesn't exist", "your name backwards", "static rain",
    "a soft emergency", "glass thoughts", "unfinished echoes",
    "the idea of leaving"
];

const endings = [
    "and nothing notices.", "but it already happened yesterday.",
    "you were never supposed to read this.", "it repeats when you blink.",
    "the room agrees silently.", "do not respond.", "this is still ongoing.",
    "it is already inside.", "there is no outside.", "you understand incorrectly."
];

function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function generate() {
    let sentence = `${pick(subjects)} ${pick(verbs)} ${pick(objects)} ${pick(endings)}`;
    
    const output = document.getElementById("output");
    output.innerText = sentence;

    // random flicker effect
    output.style.opacity = 0.2;
    setTimeout(() => {
        output.style.opacity = 1;
    }, 100);
}
</script>

</body>
</html>
